# CI: run tests (and optional frontend build) on every push and PR.
# Use this before enabling Render auto-deploy so main only gets green builds.
#
# Interface connectivity tests (Pinecone, LLM, Tavily, Mermaid.ink) are marked
# "external" and skipped in CI unless you add API keys as GitHub Secrets and
# run the optional interface-checks job. Run them locally before push:
#   python scripts/verify_setup.py
#   or: pytest tests/test_interface_connectivity.py -v -m external

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (excluding external API checks)
        env:
          LANGCHAIN_TRACING_V2: "false"
        run: pytest tests/ -m "not external" -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # Optional: run interface checks (Pinecone, LLM, etc.) when secrets are set.
  # Add GitHub Secrets (e.g. PINECONE_API_KEY, OPENAI_API_KEY) then enable this job
  # in branch protection so main only merges when interfaces are verified (cloud-ready).
  interface-checks:
    runs-on: ubuntu-latest
    if: ${{ secrets.PINECONE_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run interface connectivity checks
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"
        run: python scripts/verify_setup.py
