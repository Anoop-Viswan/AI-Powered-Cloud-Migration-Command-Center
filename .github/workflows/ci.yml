# CI: run tests (and optional frontend build) on every push and PR.
# Use this before enabling Render auto-deploy so main only gets green builds.
#
# Interface connectivity tests (Pinecone, LLM, Tavily, Mermaid.ink) are marked
# "external" and skipped in CI unless you add API keys as GitHub Secrets and
# run the optional interface-checks job. Run them locally before push:
#   python scripts/verify_setup.py
#   or: pytest tests/test_interface_connectivity.py -v -m external

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Opt into Node.js 24 for JavaScript actions (checkout, setup-node, setup-python).
# Removes Node 20 deprecation warning; required from June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (excluding external API checks)
        env:
          LANGCHAIN_TRACING_V2: "false"
        run: pytest tests/ -m "not external" -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # Optional: run ALL interface checks (Pinecone, LLM, LangSmith, Tavily, Mermaid.ink) in CI.
  # When this job runs, it runs verify_setup.py which checks every interface, not just Pinecone.
  #
  # When does this job run? Set a repository VARIABLE (not secret): Settings → Actions → Variables →
  # Add variable RUN_INTERFACE_CHECKS = "true" (or "1"). Job runs only when this variable is set.
  # Add the API key secrets (PINECONE_API_KEY, OPENAI_API_KEY, etc.) under Actions → Secrets.
  # Require this job in branch protection so main only merges when all required interfaces pass.
  interface-checks:
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_INTERFACE_CHECKS == 'true' || vars.RUN_INTERFACE_CHECKS == '1' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all interface connectivity checks
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"
          # Azure OpenAI (if you use LLM_PROVIDER=azure_openai)
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: python scripts/verify_setup.py
