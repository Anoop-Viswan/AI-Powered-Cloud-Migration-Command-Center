# CI: run tests (and optional frontend build) on every push and PR.
# Use this before enabling Render auto-deploy so main only gets green builds.
#
# Interface connectivity tests (Pinecone, LLM, Tavily, Mermaid.ink) are marked
# "external" and skipped in CI unless you add API keys as GitHub Secrets and
# run the optional interface-checks job. Run them locally before push:
#   python scripts/verify_setup.py
#   or: pytest tests/test_interface_connectivity.py -v -m external

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Opt into Node.js 24 for JavaScript actions (checkout, setup-node, setup-python).
# Removes Node 20 deprecation warning; required from June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: List tests that will run (backend)
        env:
          LANGCHAIN_TRACING_V2: "false"
        run: |
          echo "=== Backend tests (excluding external API checks) ==="
          pytest tests/ -m "not external" --collect-only -q
          echo "--- Running tests next (see step below for results and any failures) ---"

      - name: Run tests (excluding external API checks)
        env:
          LANGCHAIN_TRACING_V2: "false"
        run: |
          pytest tests/ -m "not external" -v --tb=long -ra
          echo "=== Backend test run finished ==="

  frontend-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          echo "=== Frontend: install and build (npm ci + npm run build) ==="
          npm ci
          npm run build
          echo "=== Frontend build finished ==="

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: pip-audit — Python CVE scan (hard block on critical/high)
        run: pip-audit -r requirements.txt --severity high

      - name: bandit — Python SAST (hard block on medium+ severity/confidence)
        run: bandit -ll -ii -r backend/ -x backend/__pycache__

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: npm audit — JS CVE scan (hard block on high+)
        working-directory: frontend
        run: npm audit --audit-level=high

  # Optional: run ALL interface checks (Pinecone, LLM, LangSmith, Tavily, Mermaid.ink) in CI.
  # When this job runs, it runs verify_setup.py which checks every interface, not just Pinecone.
  #
  # IMPORTANT – use a repository VARIABLE, not a Secret:
  #   GitHub repo → Settings → Secrets and variables → Actions → VARIABLES tab (not "Secrets") →
  #   New repository variable: Name = RUN_INTERFACE_CHECKS, Value = true (or 1 or yes).
  # If you add RUN_INTERFACE_CHECKS as a Secret, this job will stay skipped (we cannot read secrets in "if").
  # Also add API key secrets (PINECONE_API_KEY, OPENAI_API_KEY, etc.) under the Secrets tab.
  interface-checks:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' && (vars.RUN_INTERFACE_CHECKS == 'true' || vars.RUN_INTERFACE_CHECKS == '1' || vars.RUN_INTERFACE_CHECKS == 'True' || vars.RUN_INTERFACE_CHECKS == 'TRUE' || vars.RUN_INTERFACE_CHECKS == 'yes' || vars.RUN_INTERFACE_CHECKS == 'Yes' || vars.RUN_INTERFACE_CHECKS == 'YES') }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all interface connectivity checks
        env:
          # API keys: use Secrets (Settings → Actions → Secrets)
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"
          # Optional config: add as Variables (Settings → Actions → Variables) to match your .env
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          # Azure OpenAI (if you use LLM_PROVIDER=azure_openai)
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          echo "=== Interface checks (Pinecone, LLM, LangSmith, Tavily, Mermaid.ink) ==="
          python -u scripts/verify_setup.py
          echo "=== Interface checks finished ==="
